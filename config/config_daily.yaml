run:
  name: "daily_swing_run"
  seed: 42
  output_dir: "outputs"

data:
  symbol: "^NSEBANK"
  provider: "yfinance"       # yfinance | csv
  interval: "1d"              # daily bars — ~20yr of free history
  start: "2005-01-01"
  end: "2026-06-25"
  raw_dir: "data/raw"
  processed_dir: "data/processed"
  timezone: "Asia/Kolkata"

session:
  start: "09:15"
  end: "15:30"
  square_off: "15:15"
  no_trade_first_minutes: 5
  no_trade_last_minutes: 10

execution_proxy:
  instrument: "futures"       # futures | options
  lot_size: 15
  contract_multiplier: 1

risk:
  initial_equity: 1000000.0
  risk_per_trade_pct: 1.0
  daily_max_loss_pct: 100.0   # effectively off for swing (no intraday daily-loss halt)
  max_trades_per_day: 10
  max_open_positions: 1

strategy:
  name: "donchian"
  params_file: "config/strategies/donchian.yaml"

# Entry filters (opt-in; null = off). See features/filters.py.
filters:
  trend_sma: null          # e.g. 200 — long only above, short only below
  atr_pct_min: null        # skip dead-volatility regimes
  atr_pct_max: null        # skip explosive regimes
  adx_min: null            # require trend strength
  adx_max: null            # require ranging market
  time_start: null         # intraday only, "HH:MM"
  time_end: null

# Exit management (opt-in; null = stop/target only). See backtest/exits.py.
# A 2x ATR trailing stop measurably improves Donchian here (Calmar 0.23 -> 0.32,
# PF 1.71 -> 1.91, max DD 6.9% -> 4.1%).
exits:
  trailing_atr_mult: 2.0
  breakeven_at_r: null
  partial_exit_r: null
  partial_exit_pct: 0.5
  time_stop_bars: null

backtest:
  costs_file: "config/costs.yaml"
  slippage_model: "ticks"
  slippage_value: 1.0
  slippage_stress_multipliers: [1, 2, 4]

promotion_gates:
  min_sharpe_oos: 1.0
  min_calmar_oos: 0.5
  min_profit_factor: 1.3
  max_drawdown_pct: 20.0
  max_cost_pct_of_gross: 40.0
